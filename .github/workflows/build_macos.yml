name: Build macOS Executable

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Se hai un file requirements.txt, decommenta la riga sotto:
          # if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Crea eseguibile con PyInstaller
        run: |
          # Sostituisci 'tuo_file_principale.py' con il nome reale del tuo script
          pyinstaller --onefile --windowed tuo_file_principale.py

      - name: Carica il risultato (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Executable
          path: dist/